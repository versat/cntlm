name: C/C++ CI

on:
  push:
    branches:
      - master
      - containers
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install stuff for creating packages
      run: sudo apt install -y fakeroot rpm dpkg debhelper systemd
    - name: Install packages required for optional configurations of cntlm
      run: sudo apt install -y libkrb5-dev
    - name: Install further tools (clang-tools for scan-build)
      run: sudo apt install -y clang-tools
    - name: Normal build (gcc)
      run: |
        CC=gcc ./configure
        make
        ./cntlm -h
        make distclean
    - name: Normal build (clang)
      run: |
        CC=clang ./configure
        make
        ./cntlm -h
        make distclean
    - name: Verify debug build
      run: |
        ./configure
        make DEBUG=1
        ./cntlm -h
        make distclean
    - name: Verify package creation and installation
      run: |
        ./configure
        make rpm
        make deb
        make clean
        sudo make install
        sudo make uninstall
        make distclean
    - name: Build via scan-build (exclude duktape)
      run: |
        ./configure
        make duktape.o
        scan-build --force-analyze-debug-code make

  package-rhel:
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/ubi:latest
    steps:
      - name: Install build dependencies
        run: dnf install -y make gcc systemd rpm-build git shadow-utils && dnf clean all
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set working directory as safe
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Build the source
        run: |
         ./configure
         make rpm
      - name: Install the RPM
        run: 'rpm -iv cntlm*.rpm'
      - name: Invoke cNTLM to ensure it is installed properly
        run: cntlm -h

  package-sles:
    runs-on: ubuntu-latest
    container:
      image: registry.suse.com/suse/sle15:latest
    steps:
      - name: Install build dependencies
        run: zypper install -y make gcc systemd rpm-build git shadow && zypper clean -a
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set working directory as safe
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Build the source
        run: |
         ./configure
         make rpm
      - name: Install the RPM
        run: 'rpm -iv cntlm*.rpm'
      - name: Invoke cNTLM to ensure it is installed properly
        run: cntlm -h
